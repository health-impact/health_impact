- name: Install Deps
        run: pip install google-generativeai

**لماذا قمنا بهذا؟**
1. **المجانية:** موديل `gemini-pro` هو الأكثر استقراراً في الحسابات المجانية.
2. **التوافق:** المكتبة `google-generativeai` هي النسخة الرسمية والمستقرة التي لا تطلب إعدادات دفع معقدة.

**جرب الآن يا دكتور، وبإذن الله سيعمل البوت وتظهر النصائح في موقعك "أثر صحي" فوراً!** 🔬🌿🚀
