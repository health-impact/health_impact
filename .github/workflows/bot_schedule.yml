name: Athar Health Bot
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Deps
        run: pip install google-generativeai

      - name: Debug and Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🔍 التأكد من مكان الملفات..."
          ls -R
          python update_tips.py
          echo "🔍 محتوى الملف بعد التحديث:"
          cat athardata.json | head -n 20

      - name: Force Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # إجبار الـ Git على تحديث الفهرس
          git add -A
          
          # كتابة تاريخ اللحظة في رسالة الالتزام لضمان التغيير
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          git commit -m "تحديث طبي قسري بتاريخ $TIMESTAMP 🔬" || echo "لا يوجد شيء للرفع"
          
          # الرفع لفرع main (تأكد إنه main وليس master)
          git push origin main --force
