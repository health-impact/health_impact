name: Athar Health Bot

on:
  schedule:
    - cron: '0 */12 * * *' # يعمل كل 12 ساعة تلقائياً
  workflow_dispatch: # للتشغيل اليدوي وقت ما تحب

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # إذن صريح لحفظ الأرشيف
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
   
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_tips.py

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add athardata.json
          git commit -m "إضافة 5 نصائح جديدة للأرشيف 🔬" || echo "لا توجد تغييرات"
          git push origin main
