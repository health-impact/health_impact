name: Athar Health Bot
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # لجلب كل تاريخ الملفات لضمان المقارنة الصحيحة

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Deps
        run: pip install google-generativeai

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_tips.py

      - name: Verify and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # إجبار Git على رؤية الملف حتى لو يعتقد أنه لم يتغير
          git add athardata.json
          
          # التحقق من وجود تغييرات حقيقية
          if git diff --quiet && git diff --staged --quiet; then
            echo "⚠️ لم يتم اكتشاف أي تغييرات في ملف النصائح!"
          else
            git commit -m "تحديث طبي جديد للأرشيف 🔬"
            git push origin main
          fi
