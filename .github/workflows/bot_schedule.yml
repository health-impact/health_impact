name: Athar Health Bot

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }} # استخدام التوكن الشخصي القوي

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-generativeai

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_tips.py

      - name: Commit and Push
        run: |
          git config --global user.name "health_impact"
          git config --global user.email "mohamedjalalmody@gmail.com"
          git add athardata.json
          git commit -m "تحديث طبي حقيقي 🔬" || echo "لا يوجد تغيير"
          git push origin main
