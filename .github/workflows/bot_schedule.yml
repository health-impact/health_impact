name: Athar Health Bot

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # تصريح كتابة صريح
    steps:
      - uses: actions/checkout@v3
        with:
          persist-credentials: true # لضمان بقاء تسجيل الدخول للرفع
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install google-generativeai
      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_tips.py
      - name: Commit and Push
        run: |
          git config --local user.email "bot@athar-health.com"
          git config --local user.name "AtharBot"
          git add athardata.json
          git commit -m "تحديث تلقائي: نصيحة صحية جديدة" || echo "No changes to commit"
          git push origin main
