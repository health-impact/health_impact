name: Athar Health Bot

on:
  schedule:
    - cron: '0 */12 * * *' # كل 12 ساعة
  workflow_dispatch: # زر لتشغيله يدوياً للتجربة

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install google-generativeai
      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_tips.py
      - name: Commit and Push
        run: |
          git config --local user.email "bot@athar-health.com"
          git config --local user.name "AtharBot"
          git add athardata.json
          git commit -m "تحديث تلقائي: نصيحة صحية جديدة" || exit 0
          git push
