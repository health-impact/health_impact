name: Athar Health Bot
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Deps
        run: pip install google-generativeai

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_tips.py

      - name: Force Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # إجبار Git على تتبع الملف وإضافته
          git add --force athardata.json
          
          # محاولة الالتزام بالتغييرات (Commit)
          git commit -m "تحديث طبي قسري 🔬" || echo "لا توجد تغييرات حقيقية"
          
          # الرفع لفرع main (تأكد إنه main وليس master)
          git push origin main
