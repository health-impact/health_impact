name: Athar Health Bot
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # رفعنا النسخة لضمان التوافق

      - name: Install New Library
        run: pip install google-genai # المكتبة الجديدة

      - name: Run Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_tips.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add athardata.json
          git commit -m "تحديث طبي بالمكتبة الجديدة 🔬" || echo "No changes"
          git push origin main
