name: Fetch Health Tips

on:
  schedule:
    - cron: "0 7,19 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser
          pip install deep-translator

      - name: Run fetch_tips.py
        run: python fetch_tips.py

      - name: Print latest.json
        run: |
          echo "---- latest.json ----"
          if [ -f data/tips/latest.json ]; then
            cat data/tips/latest.json
          else
            echo "latest.json not found"
          fi

      - name: Show saved tips count
        run: |
          if [ -f data/tips/latest.json ]; then
            python -c "import json; f=open('data/tips/latest.json', encoding='utf-8'); tips=json.load(f); print('✅ تم حفظ {} نصائح'.format(len(tips)))"
          else
            echo "⚠️ latest.json غير موجود"
          fi

      - name: Configure git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Stage files
        run: git add data/tips/*.json || true

      - name: Commit and push if changed
        shell: bash
        run: |
          set -e
          if git diff --cached --quiet; then
            echo "ℹ️ لا توجد تغييرات جديدة، ما فيش commit"
          else
            git commit -m "Update tips"
            git push
          fi
