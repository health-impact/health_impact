name: Fetch Health Tips

on:
  schedule:
    - cron: "0 7,19 * * *"   # يشتغل الساعة 9 صباحًا و9 مساءً بتوقيت ليبيا (UTC+2)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser
          pip install deep-translator

      - name: Run fetch_tips.py
        run: python fetch_tips.py

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add data/tips/*.json
          if ! git diff --cached --quiet; then
            git commit -m "Update tips"
            git push
          else
            echo "ℹ️ لا توجد تغييرات جديدة، ما فيش commit"
