name: "Impact Health Auto Update"
on:
  schedule:
    - cron: "0 */12 * * *" # تحديث كل 12 ساعة
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: "Run Smart Update"
        run: |
          python3 -c "
          import re, random
          
          # المصادر المعتمدة
          pool = [
              ('غسل اليدين يقلل من انتشار الميكروبات بنسبة 40%.', 'WHO'),
              ('تجنب استهلاك اللحوم غير المطهية جيداً يمنع التسمم الغذائي.', 'FDA'),
              ('التهوية الجيدة للأماكن المغلقة تقلل تركيز الفيروسات.', 'NCDC'),
              ('تعقيم الأسطح عالية اللمس يقلل من الحمل البكتيري الميداني.', 'دراسات طرابلس'),
              ('المضادات الحيوية تعالج البكتيريا فقط ولا تعالج الفيروسات.', 'WHO')
          ]
          
          selected = random.sample(pool, 5)
          new_html = ''
          for tip, src in selected:
              new_html += f'<div class=\"tip-card\"><b>{tip}</b><br><small class=\"text-success\">المصدر: {src}</small></div>'
          
          with open('index.html', 'r', encoding='utf-8') as f:
              data = f.read()
          
          # نظام الاستبدال لمنع الردم والتضخم
          data = re.sub(r'.*?', f'{new_html}', data, flags=re.DOTALL)
          
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(data)
          "
      - name: Commit changes
        run: |
          git config --global user.name 'Impact-Health-Bot'
          git config --global user.email 'bot@impacthealth.ly'
          git add index.html
          git commit -m 'تحديث النصائح الدورية' || exit 0
          git push
