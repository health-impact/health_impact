name: Auto Update Health Tips

on:
  schedule:
    # يشتغل تلقائياً كل 12 ساعة
    - cron: '0 */12 * * *'
  workflow_dispatch: # زر التشغيل اليدوي

permissions:
  contents: write

jobs:
  update-tips:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install google-genai

      - name: Run AI Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_tips.py

      - name: Commit and Push Archive
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add athardata.json
          # إذا مفيش تغييرات مش حيعطي خطأ
          git commit -m "تحديث تلقائي: نصائح صحية جديدة" || echo "No changes to commit"
          # دفع التغييرات للفرع الرئيسي مباشرة
          git push origin HEAD:main --force
