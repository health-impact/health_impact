name: Auto Update Health Tips Directly

on:
  schedule:
    - cron: '0 */12 * * *' # تحديث كل 12 ساعة
  workflow_dispatch: # زر التشغيل اليدوي

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Get Tips from Gemini API
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # إرسال طلب مباشر لـ Gemini بدون ملف بايثون
          RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "contents": [{
                "parts": [{
                  "text": "Generate 5 unique medical public health tips for the Libyan community in Arabic. Focus on hygiene, water safety, and chronic disease prevention. Return ONLY a JSON array of objects with keys: title, content, type (warning or info), and source (e.g. WHO, NCDC). Do not include markdown code blocks, just the raw JSON array."
                }]
              }]
            }')

          # استخراج النص من استجابة JSON وتنظيفه
          TIPS=$(echo $RESPONSE | jq -r '.candidates[0].content.parts[0].text')
          
          # إضافة التاريخ والوقت الحالي لكل نصيحة
          CURRENT_DATE=$(date +"%Y-%m-%d")
          FINAL_JSON=$(echo $TIPS | jq --arg date "$CURRENT_DATE" 'map(. + {date: $date})')

          # دمج النصائح الجديدة مع الأرشيف القديم (لو موجود)
          if [ -f athardata.json ]; then
            OLD_DATA=$(cat athardata.json)
            echo "$FINAL_JSON $OLD_DATA" | jq -s 'add | unique_by(.title) | .[0:50]' > athardata.json
          else
            echo "$FINAL_JSON" > athardata.json
          fi

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add athardata.json
          git commit -m "تحديث تلقائي للنصائح الصحية الذكية" || echo "لا توجد تغييرات"
          git push
